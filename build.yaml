# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
# include:
#   - board: nice_nano//zmk
#     shield: corne_left nice_view_adapter nice_view_gem
#   - board: nice_nano//zmk
#     shield: corne_right nice_view_adapter nice_view_gem
#   - board: nice_nano//zmk
#     shield: settings_reset
#   - board: xiao_ble//zmk
#     shield: nice_nano_dongle prospector_adapter

include:
# Left keyboard - same for all modes (always peripheral)
  - board: nice_nano//zmk
    shield: corne_left nice_view_adapter nice_view

# Standalone mode - right keyboard is primary/central
  - board: nice_nano//zmk
    shield: corne_right nice_view_adapter nice_view

# Dongle mode - prospector dongle is primary/central with display, right is peripheral
  - board: xiao_ble//zmk
    shield: corne_central_dongle prospector_adapter

  - board: nice_nano//zmk
    shield: corne_peripheral_left nice_view_adapter nice_view

  - board: nice_nano//zmk
    shield: corne_peripheral_right nice_view_adapter nice_view

# Settings reset for both board types
  - board: nice_nano//zmk
    shield: settings_reset

  - board: xiao_ble//zmk
    shield: settings_reset
